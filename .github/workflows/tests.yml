name: Tests

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  phpunit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, sqlite3, gd, fileinfo, openssl, tokenizer, xml, ctype, json
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run PHPUnit
        run: php artisan test

  playwright:
    runs-on: ubuntu-latest
    needs: phpunit
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, sqlite3, gd, fileinfo, openssl, tokenizer, xml, ctype, json
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist
          npm ci

      - name: Prepare environment
        run: |
          cp .env.testing .env
          php artisan key:generate
          mkdir -p database
          : > database/testing.sqlite
          npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright app tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8765

      - name: Run Playwright install wizard test
        run: PLAYWRIGHT_INCLUDE_INSTALL=1 npx playwright test e2e/00-install.spec.ts
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8765

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
